<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" font-family="Consolas, monospace">
  <title>Text Style Record Tiers</title>

  <!-- Background -->
  <rect width="800" height="580" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" fill="#e0e0e0" font-size="18" text-anchor="middle" font-weight="bold">Text Style Record - Tier System</text>
  <text x="400" y="55" fill="#888" font-size="11" text-anchor="middle">All records in a sub-table use the SAME tier. Header byte: [Tier:2 bits][Count:6 bits]</text>

  <!-- BASE TIER -->
  <text x="30" y="95" fill="#4ade80" font-size="14" font-weight="bold">BASE TIER (8 bytes) - tier bits = 00</text>
  <text x="560" y="95" fill="#888" font-size="11">Covers 90% of use cases</text>

  <!-- Byte boxes for base -->
  <g transform="translate(30, 105)">
    <rect x="0" y="0" width="90" height="55" fill="#1e3a5f" stroke="#5b9bd5" stroke-width="1.5" rx="3"/>
    <text x="45" y="18" fill="#5b9bd5" font-size="9" text-anchor="middle">Byte 0-1</text>
    <text x="45" y="33" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">Font ID</text>
    <text x="45" y="47" fill="#90ee90" font-size="8" text-anchor="middle">12b family+4b var</text>

    <rect x="95" y="0" width="70" height="55" fill="#1e3a5f" stroke="#5b9bd5" stroke-width="1.5" rx="3"/>
    <text x="130" y="18" fill="#5b9bd5" font-size="9" text-anchor="middle">Byte 2</text>
    <text x="130" y="33" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">Size</text>
    <text x="130" y="47" fill="#90ee90" font-size="8" text-anchor="middle">1-255pt</text>

    <rect x="170" y="0" width="120" height="55" fill="#1e3a5f" stroke="#5b9bd5" stroke-width="1.5" rx="3"/>
    <text x="230" y="18" fill="#5b9bd5" font-size="9" text-anchor="middle">Byte 3</text>
    <text x="230" y="33" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">Flags</text>
    <text x="230" y="47" fill="#90ee90" font-size="8" text-anchor="middle">B I U S sub sup align</text>

    <rect x="295" y="0" width="90" height="55" fill="#1e3a5f" stroke="#5b9bd5" stroke-width="1.5" rx="3"/>
    <text x="340" y="18" fill="#5b9bd5" font-size="9" text-anchor="middle">Byte 4-5</text>
    <text x="340" y="33" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">FG Color</text>
    <text x="340" y="47" fill="#90ee90" font-size="8" text-anchor="middle">R5G6B5</text>

    <rect x="390" y="0" width="90" height="55" fill="#1e3a5f" stroke="#5b9bd5" stroke-width="1.5" rx="3"/>
    <text x="435" y="18" fill="#5b9bd5" font-size="9" text-anchor="middle">Byte 6-7</text>
    <text x="435" y="33" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">BG Color</text>
    <text x="435" y="47" fill="#90ee90" font-size="8" text-anchor="middle">R5G6B5</text>
  </g>

  <!-- EXTENDED TIER -->
  <text x="30" y="210" fill="#a855f7" font-size="14" font-weight="bold">EXTENDED TIER (12 bytes) - tier bits = 01</text>
  <text x="560" y="210" fill="#888" font-size="11">Adds shadow, spacing, height</text>

  <g transform="translate(30, 220)">
    <!-- Base bytes (dimmed) -->
    <rect x="0" y="0" width="480" height="55" fill="#1a1a3e" stroke="#444" stroke-width="1" rx="3"/>
    <text x="240" y="33" fill="#666" font-size="12" text-anchor="middle">Base tier bytes 0-7 (same as above)</text>

    <!-- Extended bytes -->
    <rect x="485" y="0" width="110" height="55" fill="#3d1f5c" stroke="#a855f7" stroke-width="1.5" rx="3"/>
    <text x="540" y="18" fill="#a855f7" font-size="9" text-anchor="middle">Byte 8-9</text>
    <text x="540" y="33" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">Shadow</text>
    <text x="540" y="47" fill="#d8b4fe" font-size="8" text-anchor="middle">X:6 Y:6 Blur:4</text>

    <rect x="600" y="0" width="75" height="55" fill="#3d1f5c" stroke="#a855f7" stroke-width="1.5" rx="3"/>
    <text x="637" y="18" fill="#a855f7" font-size="9" text-anchor="middle">Byte 10</text>
    <text x="637" y="33" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">Letter Sp</text>
    <text x="637" y="47" fill="#d8b4fe" font-size="8" text-anchor="middle">-128..127</text>

    <rect x="680" y="0" width="75" height="55" fill="#3d1f5c" stroke="#a855f7" stroke-width="1.5" rx="3"/>
    <text x="717" y="18" fill="#a855f7" font-size="9" text-anchor="middle">Byte 11</text>
    <text x="717" y="33" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">Line Ht</text>
    <text x="717" y="47" fill="#d8b4fe" font-size="8" text-anchor="middle">0=auto</text>
  </g>

  <!-- RARE TIER -->
  <text x="30" y="325" fill="#f59e0b" font-size="14" font-weight="bold">RARE TIER (16 bytes) - tier bits = 10</text>
  <text x="560" y="325" fill="#888" font-size="11">Adds effects, transforms</text>

  <g transform="translate(30, 335)">
    <!-- Base+Extended bytes (dimmed) -->
    <rect x="0" y="0" width="480" height="55" fill="#1a1a3e" stroke="#444" stroke-width="1" rx="3"/>
    <text x="240" y="28" fill="#666" font-size="12" text-anchor="middle">Base bytes 0-7</text>
    <rect x="485" y="0" width="270" height="55" fill="#2a1a3e" stroke="#555" stroke-width="1" rx="3"/>
    <text x="620" y="28" fill="#777" font-size="12" text-anchor="middle">Extended bytes 8-11</text>

    <!-- Rare bytes -->
    <rect x="0" y="62" width="120" height="55" fill="#5c3d1f" stroke="#f59e0b" stroke-width="1.5" rx="3"/>
    <text x="60" y="80" fill="#f59e0b" font-size="9" text-anchor="middle">Byte 12</text>
    <text x="60" y="95" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">Effect</text>
    <text x="60" y="109" fill="#fde68a" font-size="8" text-anchor="middle">ID:4b Intensity:4b</text>

    <rect x="125" y="62" width="160" height="55" fill="#5c3d1f" stroke="#f59e0b" stroke-width="1.5" rx="3"/>
    <text x="205" y="80" fill="#f59e0b" font-size="9" text-anchor="middle">Byte 13</text>
    <text x="205" y="95" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">Transform+Dir+WordSp</text>
    <text x="205" y="109" fill="#fde68a" font-size="8" text-anchor="middle">2b + 2b + 4b</text>

    <rect x="290" y="62" width="110" height="55" fill="#5c3d1f" stroke="#f59e0b" stroke-width="1.5" rx="3"/>
    <text x="345" y="80" fill="#f59e0b" font-size="9" text-anchor="middle">Byte 14-15</text>
    <text x="345" y="95" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">Effect Color</text>
    <text x="345" y="109" fill="#fde68a" font-size="8" text-anchor="middle">R5G6B5</text>
  </g>

  <!-- Size comparison -->
  <text x="400" y="490" fill="#e0e0e0" font-size="14" text-anchor="middle" font-weight="bold">Size Savings Example: 3 text styles</text>

  <g transform="translate(80, 500)">
    <rect x="0" y="0" width="160" height="30" fill="#4ade80" fill-opacity="0.3" stroke="#4ade80" stroke-width="1" rx="3"/>
    <text x="80" y="20" fill="#4ade80" font-size="11" text-anchor="middle">Base: 3 x 8 = 24 bytes</text>

    <rect x="220" y="0" width="200" height="30" fill="#a855f7" fill-opacity="0.3" stroke="#a855f7" stroke-width="1" rx="3"/>
    <text x="320" y="20" fill="#a855f7" font-size="11" text-anchor="middle">Extended: 3 x 12 = 36 bytes</text>

    <rect x="480" y="0" width="200" height="30" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1" rx="3"/>
    <text x="580" y="20" fill="#f59e0b" font-size="11" text-anchor="middle">Rare: 3 x 16 = 48 bytes</text>
  </g>

  <text x="400" y="555" fill="#666" font-size="10" text-anchor="middle">If none of your styles need shadows, use Base tier and save 50% vs Rare</text>
</svg>
