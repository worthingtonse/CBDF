<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" font-family="Consolas, monospace">
  <title>CBDF Layout Byte</title>

  <!-- Background -->
  <rect width="800" height="550" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" fill="#e0e0e0" font-size="18" text-anchor="middle" font-weight="bold">Layout Byte (1 byte = 256 predefined layouts)</text>

  <!-- Bit layout -->
  <g transform="translate(100, 50)">
    <text x="300" y="15" fill="#888" font-size="11" text-anchor="middle">Bit 7                                                   Bit 0</text>

    <!-- Row bits (6-7) -->
    <rect x="0" y="22" width="75" height="40" fill="#6a4a2d" stroke="#f59e0b" stroke-width="2" rx="3"/>
    <rect x="75" y="22" width="75" height="40" fill="#6a4a2d" stroke="#f59e0b" stroke-width="2" rx="3"/>
    <text x="75" y="48" fill="#ffffff" font-size="11" text-anchor="middle" font-weight="bold">Rows (2 bits)</text>

    <!-- Column bits (4-5) -->
    <rect x="150" y="22" width="75" height="40" fill="#4a2d6a" stroke="#a855f7" stroke-width="2" rx="3"/>
    <rect x="225" y="22" width="75" height="40" fill="#4a2d6a" stroke="#a855f7" stroke-width="2" rx="3"/>
    <text x="225" y="48" fill="#ffffff" font-size="11" text-anchor="middle" font-weight="bold">Cols (2 bits)</text>

    <!-- Panel bits (0-3) -->
    <rect x="300" y="22" width="75" height="40" fill="#2d4a7a" stroke="#5b9bd5" stroke-width="2" rx="3"/>
    <rect x="375" y="22" width="75" height="40" fill="#2d4a7a" stroke="#5b9bd5" stroke-width="2" rx="3"/>
    <rect x="450" y="22" width="75" height="40" fill="#2d4a7a" stroke="#5b9bd5" stroke-width="2" rx="3"/>
    <rect x="525" y="22" width="75" height="40" fill="#2d4a7a" stroke="#5b9bd5" stroke-width="2" rx="3"/>

    <!-- Bit labels -->
    <text x="37" y="72" fill="#f59e0b" font-size="9" text-anchor="middle">7</text>
    <text x="112" y="72" fill="#f59e0b" font-size="9" text-anchor="middle">6</text>
    <text x="187" y="72" fill="#a855f7" font-size="9" text-anchor="middle">5</text>
    <text x="262" y="72" fill="#a855f7" font-size="9" text-anchor="middle">4</text>
    <text x="337" y="72" fill="#5b9bd5" font-size="9" text-anchor="middle">3: Right</text>
    <text x="412" y="72" fill="#5b9bd5" font-size="9" text-anchor="middle">2: Left</text>
    <text x="487" y="72" fill="#5b9bd5" font-size="9" text-anchor="middle">1: Footer</text>
    <text x="562" y="72" fill="#5b9bd5" font-size="9" text-anchor="middle">0: Header</text>
  </g>

  <!-- Encoding tables -->
  <g transform="translate(50, 140)">
    <text x="0" y="0" fill="#5b9bd5" font-size="12" font-weight="bold">Panel Flags (Bits 0-3):</text>
    <text x="0" y="18" fill="#b0b0b0" font-size="10">Bit 0 = Header exists</text>
    <text x="0" y="33" fill="#b0b0b0" font-size="10">Bit 1 = Footer exists</text>
    <text x="0" y="48" fill="#b0b0b0" font-size="10">Bit 2 = Left aside exists</text>
    <text x="0" y="63" fill="#b0b0b0" font-size="10">Bit 3 = Right aside exists</text>
    <text x="0" y="80" fill="#888" font-size="10">Main panel is always implied</text>
  </g>

  <g transform="translate(300, 140)">
    <text x="0" y="0" fill="#a855f7" font-size="12" font-weight="bold">Columns (Bits 4-5):</text>
    <text x="0" y="18" fill="#b0b0b0" font-size="10">00 = 1 column</text>
    <text x="0" y="33" fill="#b0b0b0" font-size="10">01 = 2 columns</text>
    <text x="0" y="48" fill="#b0b0b0" font-size="10">10 = 3 columns</text>
    <text x="0" y="63" fill="#b0b0b0" font-size="10">11 = 4 columns</text>
  </g>

  <g transform="translate(530, 140)">
    <text x="0" y="0" fill="#f59e0b" font-size="12" font-weight="bold">Rows (Bits 6-7):</text>
    <text x="0" y="18" fill="#b0b0b0" font-size="10">00 = 1 row</text>
    <text x="0" y="33" fill="#b0b0b0" font-size="10">01 = 2 rows</text>
    <text x="0" y="48" fill="#b0b0b0" font-size="10">10 = 3 rows</text>
    <text x="0" y="63" fill="#b0b0b0" font-size="10">11 = 4 rows</text>
  </g>

  <!-- Layout examples -->
  <text x="400" y="255" fill="#e0e0e0" font-size="14" text-anchor="middle" font-weight="bold">Example Layouts</text>

  <!-- 0x00: Main only -->
  <g transform="translate(30, 270)">
    <text x="70" y="15" fill="#f59e0b" font-size="11" text-anchor="middle" font-weight="bold">0x00</text>
    <rect x="20" y="22" width="100" height="80" fill="#2d6a4a" stroke="#4ade80" stroke-width="1.5" rx="3"/>
    <text x="70" y="68" fill="#ffffff" font-size="12" text-anchor="middle">Main</text>
    <text x="70" y="115" fill="#888" font-size="9" text-anchor="middle">Main only</text>
  </g>

  <!-- 0x01: Header + Main -->
  <g transform="translate(170, 270)">
    <text x="70" y="15" fill="#f59e0b" font-size="11" text-anchor="middle" font-weight="bold">0x01</text>
    <rect x="20" y="22" width="100" height="20" fill="#2d4a7a" stroke="#5b9bd5" stroke-width="1" rx="2"/>
    <text x="70" y="37" fill="#ffffff" font-size="9" text-anchor="middle">Header</text>
    <rect x="20" y="44" width="100" height="58" fill="#2d6a4a" stroke="#4ade80" stroke-width="1.5" rx="2"/>
    <text x="70" y="78" fill="#ffffff" font-size="11" text-anchor="middle">Main</text>
    <text x="70" y="115" fill="#888" font-size="9" text-anchor="middle">Header + Main</text>
  </g>

  <!-- 0x03: Header + Footer + Main -->
  <g transform="translate(310, 270)">
    <text x="70" y="15" fill="#f59e0b" font-size="11" text-anchor="middle" font-weight="bold">0x03</text>
    <rect x="20" y="22" width="100" height="18" fill="#2d4a7a" stroke="#5b9bd5" stroke-width="1" rx="2"/>
    <text x="70" y="35" fill="#ffffff" font-size="8" text-anchor="middle">Header</text>
    <rect x="20" y="42" width="100" height="42" fill="#2d6a4a" stroke="#4ade80" stroke-width="1.5" rx="2"/>
    <text x="70" y="68" fill="#ffffff" font-size="11" text-anchor="middle">Main</text>
    <rect x="20" y="86" width="100" height="16" fill="#4a2d6a" stroke="#a855f7" stroke-width="1" rx="2"/>
    <text x="70" y="98" fill="#ffffff" font-size="8" text-anchor="middle">Footer</text>
    <text x="70" y="115" fill="#888" font-size="9" text-anchor="middle">Hdr + Main + Ftr</text>
  </g>

  <!-- 0x0F: All panels -->
  <g transform="translate(450, 270)">
    <text x="70" y="15" fill="#f59e0b" font-size="11" text-anchor="middle" font-weight="bold">0x0F</text>
    <rect x="20" y="22" width="100" height="16" fill="#2d4a7a" stroke="#5b9bd5" stroke-width="1" rx="2"/>
    <text x="70" y="34" fill="#ffffff" font-size="7" text-anchor="middle">Header</text>
    <rect x="20" y="40" width="20" height="44" fill="#6a4a2d" stroke="#f59e0b" stroke-width="1" rx="2"/>
    <text x="30" y="66" fill="#fff" font-size="7" text-anchor="middle" transform="rotate(-90,30,66)">Left</text>
    <rect x="42" y="40" width="56" height="44" fill="#2d6a4a" stroke="#4ade80" stroke-width="1.5" rx="2"/>
    <text x="70" y="66" fill="#ffffff" font-size="10" text-anchor="middle">Main</text>
    <rect x="100" y="40" width="20" height="44" fill="#6a4a2d" stroke="#f59e0b" stroke-width="1" rx="2"/>
    <text x="110" y="66" fill="#fff" font-size="7" text-anchor="middle" transform="rotate(90,110,66)">Right</text>
    <rect x="20" y="86" width="100" height="16" fill="#4a2d6a" stroke="#a855f7" stroke-width="1" rx="2"/>
    <text x="70" y="97" fill="#ffffff" font-size="7" text-anchor="middle">Footer</text>
    <text x="70" y="115" fill="#888" font-size="9" text-anchor="middle">All panels</text>
  </g>

  <!-- 0x11: Header + Main 2 cols -->
  <g transform="translate(590, 270)">
    <text x="70" y="15" fill="#f59e0b" font-size="11" text-anchor="middle" font-weight="bold">0x11</text>
    <rect x="20" y="22" width="100" height="18" fill="#2d4a7a" stroke="#5b9bd5" stroke-width="1" rx="2"/>
    <text x="70" y="35" fill="#ffffff" font-size="8" text-anchor="middle">Header</text>
    <rect x="20" y="42" width="48" height="60" fill="#2d6a4a" stroke="#4ade80" stroke-width="1.5" rx="2"/>
    <text x="44" y="76" fill="#ffffff" font-size="9" text-anchor="middle">Col 1</text>
    <rect x="72" y="42" width="48" height="60" fill="#2d6a4a" stroke="#4ade80" stroke-width="1.5" rx="2"/>
    <text x="96" y="76" fill="#ffffff" font-size="9" text-anchor="middle">Col 2</text>
    <text x="70" y="115" fill="#888" font-size="9" text-anchor="middle">Hdr + 2 cols</text>
  </g>

  <!-- Decode example -->
  <text x="400" y="420" fill="#e0e0e0" font-size="13" text-anchor="middle" font-weight="bold">Decoding Example: 0x3F = 0011 1111</text>

  <g transform="translate(100, 432)">
    <text x="0" y="15" fill="#5b9bd5" font-size="11">Bits 0-3 = 1111: Header + Footer + Left + Right</text>
    <text x="0" y="33" fill="#a855f7" font-size="11">Bits 4-5 = 11:   4 columns</text>
    <text x="0" y="51" fill="#f59e0b" font-size="11">Bits 6-7 = 00:   1 row</text>
    <text x="380" y="33" fill="#ffffff" font-size="13" font-weight="bold">= All panels, 4-column, single-row layout</text>
  </g>

  <!-- Size comparison -->
  <text x="400" y="520" fill="#e74c3c" font-size="11" text-anchor="middle">HTML/CSS layout: 200-2000 bytes  vs  CBDF: 1 byte  =  99%+ smaller</text>
</svg>
