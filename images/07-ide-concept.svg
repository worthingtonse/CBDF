<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="Consolas, monospace">
  <title>CBDF Visual IDE Concept</title>

  <!-- Background -->
  <rect width="1100" height="750" fill="#1e1e2e" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1100" height="36" fill="#2d2d3d" rx="8"/>
  <rect x="0" y="20" width="1100" height="16" fill="#2d2d3d"/>
  <circle cx="18" cy="18" r="6" fill="#e74c3c"/>
  <circle cx="38" cy="18" r="6" fill="#f59e0b"/>
  <circle cx="58" cy="18" r="6" fill="#4ade80"/>
  <text x="550" y="23" fill="#888" font-size="12" text-anchor="middle">CBDF Editor - newsletter.qmail</text>

  <!-- Toolbar -->
  <rect x="0" y="36" width="1100" height="30" fill="#252535"/>
  <text x="15" y="55" fill="#aaa" font-size="10">File</text>
  <text x="50" y="55" fill="#aaa" font-size="10">Edit</text>
  <text x="85" y="55" fill="#aaa" font-size="10">View</text>
  <text x="125" y="55" fill="#aaa" font-size="10">Insert</text>
  <text x="175" y="55" fill="#aaa" font-size="10">Logic</text>
  <text x="220" y="55" fill="#aaa" font-size="10">Preview</text>
  <text x="280" y="55" fill="#6be36b" font-size="10" font-weight="bold">Export CBDF</text>
  <!-- Layout selector -->
  <rect x="880" y="40" width="200" height="22" fill="#1a1a2e" stroke="#444" stroke-width="1" rx="3"/>
  <text x="890" y="55" fill="#6be36b" font-size="9">Layout: 0x03 (Hdr+Ftr+Main)</text>

  <!-- ==================== LEFT PANEL: Element Tree ==================== -->
  <rect x="0" y="66" width="180" height="420" fill="#1a2332"/>
  <rect x="0" y="66" width="180" height="24" fill="#252535"/>
  <text x="10" y="82" fill="#6be36b" font-size="11" font-weight="bold">ELEMENTS</text>

  <!-- Tree items -->
  <g transform="translate(10, 98)">
    <text x="0" y="0" fill="#ccc" font-size="10">v Page</text>
    <text x="12" y="18" fill="#5b9bd5" font-size="10">v Header (panel)</text>
    <text x="24" y="36" fill="#aaa" font-size="9">Nav Bar #1</text>
    <text x="12" y="56" fill="#5b9bd5" font-size="10">v Main (panel)</text>
    <text x="24" y="74" fill="#f59e0b" font-size="9">Heading #2</text>
    <text x="24" y="90" fill="#aaa" font-size="9">Paragraph #3</text>
    <text x="24" y="106" fill="#a855f7" font-size="9">Image #4</text>
    <text x="24" y="122" fill="#f59e0b" font-size="9">Button #5</text>
    <rect x="20" y="113" width="140" height="14" fill="rgba(107,227,107,0.15)" rx="2"/>
    <text x="24" y="138" fill="#aaa" font-size="9">Input #7 (email)</text>
    <text x="24" y="154" fill="#e74c3c" font-size="9">Error #8 (hidden)</text>
    <text x="12" y="174" fill="#5b9bd5" font-size="10">v Footer (panel)</text>
    <text x="24" y="192" fill="#aaa" font-size="9">Copyright #9</text>
  </g>

  <!-- Layers section -->
  <rect x="0" y="310" width="180" height="24" fill="#252535"/>
  <text x="10" y="326" fill="#6be36b" font-size="11" font-weight="bold">LAYERS</text>
  <g transform="translate(10, 340)">
    <rect x="0" y="0" width="12" height="12" fill="#4ade80" rx="2"/>
    <text x="18" y="11" fill="#aaa" font-size="10">Layer 0 (Background)</text>
    <rect x="0" y="18" width="12" height="12" fill="#4ade80" rx="2"/>
    <text x="18" y="29" fill="#aaa" font-size="10">Layer 1 (Content)</text>
    <rect x="0" y="36" width="12" height="12" fill="#333" stroke="#555" stroke-width="1" rx="2"/>
    <text x="18" y="47" fill="#666" font-size="10">Layer 10 (Modal)</text>
  </g>

  <!-- Styles section -->
  <rect x="0" y="400" width="180" height="24" fill="#252535"/>
  <text x="10" y="416" fill="#6be36b" font-size="11" font-weight="bold">STYLES</text>
  <g transform="translate(10, 428)">
    <rect x="0" y="0" width="155" height="16" fill="rgba(91,155,213,0.15)" rx="2"/>
    <text x="5" y="12" fill="#5b9bd5" font-size="9">#0 Default (Arial 12pt)</text>
    <rect x="0" y="19" width="155" height="16" fill="rgba(91,155,213,0.15)" rx="2"/>
    <text x="5" y="31" fill="#5b9bd5" font-size="9">#1 Heading (Montserrat 24pt Bold)</text>
    <rect x="0" y="38" width="155" height="16" fill="rgba(91,155,213,0.15)" rx="2"/>
    <text x="5" y="50" fill="#5b9bd5" font-size="9">#2 Button (Arial 14pt White)</text>
    <rect x="0" y="57" width="155" height="16" fill="rgba(229,80,80,0.15)" rx="2"/>
    <text x="5" y="69" fill="#e74c3c" font-size="9">#3 Error (Arial 11pt Red)</text>
  </g>

  <!-- ==================== CENTER PANEL: Canvas ==================== -->
  <rect x="180" y="66" width="620" height="420" fill="#0d1f0d" stroke="#333" stroke-width="1"/>
  <rect x="180" y="66" width="620" height="24" fill="#252535"/>
  <text x="490" y="82" fill="#6be36b" font-size="11" text-anchor="middle" font-weight="bold">DOCUMENT CANVAS</text>

  <!-- The rendered document preview -->
  <g transform="translate(200, 100)">
    <!-- Header panel -->
    <rect x="0" y="0" width="580" height="45" fill="#1a3a1a" stroke="#2d5a2d" stroke-width="1" rx="4"/>
    <text x="15" y="18" fill="#6be36b" font-size="10" font-weight="bold">NEWSLETTER</text>
    <!-- Nav items -->
    <g transform="translate(300, 0)">
      <text x="0" y="28" fill="#8ef08e" font-size="9">Home</text>
      <text x="50" y="28" fill="#aaa" font-size="9">About</text>
      <text x="100" y="28" fill="#aaa" font-size="9">Subscribe</text>
      <text x="170" y="28" fill="#aaa" font-size="9">Contact</text>
    </g>

    <!-- Main panel -->
    <rect x="0" y="50" width="580" height="280" fill="#0a150a" stroke="#2d5a2d" stroke-width="1" rx="4"/>

    <!-- Heading -->
    <text x="20" y="80" fill="#6be36b" font-size="18" font-weight="bold">Welcome to Our Newsletter</text>
    <rect x="15" y="62" width="320" height="24" fill="none" stroke="#5b9bd5" stroke-width="1" stroke-dasharray="3,3" rx="2"/>
    <text x="340" y="76" fill="#5b9bd5" font-size="8">#2</text>

    <!-- Paragraph -->
    <text x="20" y="110" fill="#ccc" font-size="10">Stay updated with the latest news and features.</text>
    <text x="20" y="125" fill="#ccc" font-size="10">Subscribe below to get started.</text>

    <!-- Image placeholder -->
    <rect x="20" y="140" width="200" height="100" fill="#1a2a1a" stroke="#4ade80" stroke-width="1" stroke-dasharray="4,3" rx="4"/>
    <text x="120" y="185" fill="#4ade80" font-size="10" text-anchor="middle">Image #4</text>
    <text x="120" y="200" fill="#666" font-size="8" text-anchor="middle">hero-banner.jpg</text>

    <!-- Form area -->
    <rect x="250" y="145" width="310" height="85" fill="rgba(107,227,107,0.05)" stroke="#2d5a2d" stroke-width="1" rx="4"/>
    <text x="265" y="165" fill="#8ef08e" font-size="10">Email address:</text>
    <!-- Input field -->
    <rect x="265" y="172" width="200" height="22" fill="#0d1f0d" stroke="#444" stroke-width="1" rx="3"/>
    <text x="275" y="187" fill="#666" font-size="9">you@example.com</text>
    <text x="470" y="185" fill="#5b9bd5" font-size="8">#7</text>
    <!-- Error (hidden) -->
    <rect x="265" y="197" width="150" height="14" fill="none" stroke="#e74c3c" stroke-width="1" stroke-dasharray="2,2" rx="2"/>
    <text x="275" y="207" fill="#e74c3c" font-size="8" opacity="0.5">Email is required</text>
    <text x="420" y="207" fill="#e74c3c" font-size="7">#8 (hidden)</text>

    <!-- Button - SELECTED (green highlight) -->
    <rect x="265" y="215" width="100" height="26" fill="#2d6a4a" stroke="#6be36b" stroke-width="2" rx="4"/>
    <text x="315" y="232" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">Sign Up</text>
    <text x="370" y="232" fill="#6be36b" font-size="8">#5 selected</text>

    <!-- Footer panel -->
    <rect x="0" y="335" width="580" height="35" fill="#1a3a1a" stroke="#2d5a2d" stroke-width="1" rx="4"/>
    <text x="290" y="357" fill="#666" font-size="9" text-anchor="middle">2026 CloudCoin Consortium. All rights reserved.</text>
  </g>

  <!-- ==================== RIGHT PANEL: Properties ==================== -->
  <rect x="800" y="66" width="300" height="420" fill="#1a2332"/>
  <rect x="800" y="66" width="300" height="24" fill="#252535"/>
  <text x="810" y="82" fill="#6be36b" font-size="11" font-weight="bold">PROPERTIES: Button #5 "Sign Up"</text>

  <g transform="translate(810, 98)">
    <!-- Property fields -->
    <text x="0" y="0" fill="#888" font-size="9">APPEARANCE</text>
    <line x1="0" y1="5" x2="270" y2="5" stroke="#333" stroke-width="1"/>

    <text x="0" y="22" fill="#aaa" font-size="10">Text Style:</text>
    <rect x="100" y="12" width="170" height="16" fill="#1a1a2e" stroke="#444" stroke-width="1" rx="2"/>
    <text x="108" y="24" fill="#5b9bd5" font-size="9">#2 Button (Arial 14pt White)</text>

    <text x="0" y="44" fill="#aaa" font-size="10">BG Style:</text>
    <rect x="100" y="34" width="170" height="16" fill="#1a1a2e" stroke="#444" stroke-width="1" rx="2"/>
    <text x="108" y="46" fill="#4ade80" font-size="9">#1 Green gradient</text>

    <text x="0" y="66" fill="#aaa" font-size="10">Border:</text>
    <rect x="100" y="56" width="170" height="16" fill="#1a1a2e" stroke="#444" stroke-width="1" rx="2"/>
    <text x="108" y="68" fill="#aaa" font-size="9">#0 Rounded 8px</text>

    <text x="0" y="98" fill="#888" font-size="9">IDENTITY</text>
    <line x1="0" y1="103" x2="270" y2="103" stroke="#333" stroke-width="1"/>

    <text x="0" y="118" fill="#aaa" font-size="10">Element ID:</text>
    <rect x="100" y="108" width="50" height="16" fill="#1a1a2e" stroke="#6be36b" stroke-width="1" rx="2"/>
    <text x="118" y="120" fill="#6be36b" font-size="10" text-anchor="middle">5</text>

    <text x="0" y="140" fill="#aaa" font-size="10">Layer:</text>
    <rect x="100" y="130" width="50" height="16" fill="#1a1a2e" stroke="#444" stroke-width="1" rx="2"/>
    <text x="118" y="142" fill="#aaa" font-size="10" text-anchor="middle">1</text>

    <text x="0" y="172" fill="#888" font-size="9">EVENTS (1)</text>
    <line x1="0" y1="177" x2="270" y2="177" stroke="#333" stroke-width="1"/>

    <!-- Event summary -->
    <rect x="0" y="185" width="270" height="22" fill="rgba(91,155,213,0.15)" stroke="#5b9bd5" stroke-width="1" rx="3"/>
    <text x="8" y="200" fill="#5b9bd5" font-size="9">CLICK -> validate + show modal</text>
    <text x="248" y="200" fill="#666" font-size="9">Edit</text>

    <!-- Add event button -->
    <rect x="0" y="215" width="270" height="20" fill="none" stroke="#4ade80" stroke-width="1" stroke-dasharray="3,3" rx="3"/>
    <text x="135" y="229" fill="#4ade80" font-size="9" text-anchor="middle">+ Add Event</text>
  </g>

  <!-- ==================== BOTTOM PANEL: Logic Editor ==================== -->
  <rect x="0" y="486" width="1100" height="264" fill="#12182a"/>
  <rect x="0" y="486" width="1100" height="26" fill="#252535"/>
  <text x="10" y="504" fill="#6be36b" font-size="11" font-weight="bold">LOGIC EDITOR</text>
  <text x="200" y="504" fill="#888" font-size="10">Element #5 "Sign Up Button"</text>

  <!-- Action palette on the right -->
  <rect x="900" y="512" width="200" height="238" fill="#1a2332" rx="4"/>
  <rect x="900" y="512" width="200" height="20" fill="#252535" rx="4"/>
  <rect x="900" y="528" width="200" height="4" fill="#252535"/>
  <text x="1000" y="526" fill="#888" font-size="9" text-anchor="middle">ACTION PALETTE</text>

  <g transform="translate(910, 540)">
    <rect x="0" y="0" width="180" height="18" fill="rgba(74,222,128,0.1)" stroke="#4ade80" stroke-width="1" rx="3"/>
    <text x="8" y="13" fill="#4ade80" font-size="9">SHOW element</text>
    <rect x="0" y="22" width="180" height="18" fill="rgba(74,222,128,0.1)" stroke="#4ade80" stroke-width="1" rx="3"/>
    <text x="8" y="35" fill="#4ade80" font-size="9">HIDE element</text>
    <rect x="0" y="44" width="180" height="18" fill="rgba(74,222,128,0.1)" stroke="#4ade80" stroke-width="1" rx="3"/>
    <text x="8" y="57" fill="#4ade80" font-size="9">SET_STYLE element</text>
    <rect x="0" y="66" width="180" height="18" fill="rgba(168,85,247,0.1)" stroke="#a855f7" stroke-width="1" rx="3"/>
    <text x="8" y="79" fill="#a855f7" font-size="9">FADE_IN element</text>
    <rect x="0" y="88" width="180" height="18" fill="rgba(168,85,247,0.1)" stroke="#a855f7" stroke-width="1" rx="3"/>
    <text x="8" y="101" fill="#a855f7" font-size="9">SHAKE element</text>
    <rect x="0" y="110" width="180" height="18" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="1" rx="3"/>
    <text x="8" y="123" fill="#f59e0b" font-size="9">MODAL_OPEN layer</text>
    <rect x="0" y="132" width="180" height="18" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="1" rx="3"/>
    <text x="8" y="145" fill="#f59e0b" font-size="9">MODAL_CLOSE layer</text>
    <rect x="0" y="154" width="180" height="18" fill="rgba(91,155,213,0.1)" stroke="#5b9bd5" stroke-width="1" rx="3"/>
    <text x="8" y="167" fill="#5b9bd5" font-size="9">SCROLL_TO element</text>
    <text x="90" y="190" fill="#555" font-size="8" text-anchor="middle">Drag to add...</text>
  </g>

  <!-- Logic blocks -->
  <g transform="translate(15, 520)">
    <!-- Event block: CLICK -->
    <rect x="0" y="0" width="860" height="220" fill="rgba(91,155,213,0.08)" stroke="#5b9bd5" stroke-width="2" rx="6"/>
    <rect x="0" y="0" width="860" height="28" fill="rgba(91,155,213,0.2)" rx="6"/>
    <rect x="0" y="20" width="860" height="8" fill="rgba(91,155,213,0.2)"/>
    <text x="14" y="19" fill="#5b9bd5" font-size="12" font-weight="bold">EVENT: CLICK</text>
    <text x="820" y="19" fill="#444" font-size="10">x</text>

    <!-- Condition branch 1: IF EMPTY -->
    <g transform="translate(20, 38)">
      <!-- Condition diamond -->
      <polygon points="10,15 70,0 130,15 70,30" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="70" y="19" fill="#f59e0b" font-size="9" text-anchor="middle">IF input #7 EMPTY</text>

      <!-- True branch arrow -->
      <line x1="130" y1="15" x2="155" y2="15" stroke="#4ade80" stroke-width="1.5"/>
      <polygon points="153,11 153,19 160,15" fill="#4ade80"/>
      <text x="142" y="8" fill="#4ade80" font-size="7">TRUE</text>

      <!-- Actions for true branch -->
      <rect x="165" y="0" width="200" height="24" fill="rgba(168,85,247,0.12)" stroke="#a855f7" stroke-width="1.5" rx="4"/>
      <text x="175" y="16" fill="#a855f7" font-size="10">SHAKE element #7 (int:5)</text>

      <line x1="265" y1="24" x2="265" y2="32" stroke="#666" stroke-width="1"/>

      <rect x="165" y="32" width="200" height="24" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5" rx="4"/>
      <text x="175" y="48" fill="#4ade80" font-size="10">SHOW element #8</text>

      <line x1="265" y1="56" x2="265" y2="64" stroke="#666" stroke-width="1"/>

      <rect x="165" y="64" width="200" height="24" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5" rx="4"/>
      <text x="175" y="80" fill="#4ade80" font-size="10">SET_STYLE #8 -> #3 (red)</text>
    </g>

    <!-- Condition branch 2: ELSE (NOT EMPTY) -->
    <g transform="translate(20, 140)">
      <polygon points="10,15 70,0 130,15 70,30" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="70" y="19" fill="#f59e0b" font-size="9" text-anchor="middle">ELSE (NOT EMPTY)</text>

      <line x1="130" y1="15" x2="155" y2="15" stroke="#4ade80" stroke-width="1.5"/>
      <polygon points="153,11 153,19 160,15" fill="#4ade80"/>

      <rect x="165" y="0" width="200" height="24" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5" rx="4"/>
      <text x="175" y="16" fill="#4ade80" font-size="10">HIDE element #8</text>

      <line x1="265" y1="24" x2="265" y2="32" stroke="#666" stroke-width="1"/>

      <rect x="165" y="32" width="200" height="24" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="1.5" rx="4"/>
      <text x="175" y="48" fill="#f59e0b" font-size="10">MODAL_OPEN layer #10 (300ms)</text>

      <line x1="265" y1="56" x2="265" y2="64" stroke="#666" stroke-width="1"/>

      <rect x="165" y="64" width="200" height="24" fill="rgba(168,85,247,0.12)" stroke="#a855f7" stroke-width="1.5" rx="4"/>
      <text x="175" y="80" fill="#a855f7" font-size="10">FADE_IN layer #10 (300ms)</text>
    </g>

    <!-- Generated bytes indicator -->
    <rect x="500" y="40" width="340" height="55" fill="rgba(0,0,0,0.3)" stroke="#333" stroke-width="1" rx="4"/>
    <text x="515" y="58" fill="#666" font-size="9">Generated CBDF Logic (auto):</text>
    <text x="515" y="74" fill="#6be36b" font-size="9">Rule 1: 01 05 12 07 07 27 07 05 01 08 10 08 03</text>
    <text x="515" y="88" fill="#6be36b" font-size="9">Rule 2: 01 05 12 08 07 02 08 30 0A 1E 20 0A 1E</text>
  </g>
</svg>
