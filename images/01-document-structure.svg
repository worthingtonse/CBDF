<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Consolas, monospace">
  <title>CBDF Document Structure</title>

  <!-- Background -->
  <rect width="900" height="520" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="450" y="35" fill="#e0e0e0" font-size="18" text-anchor="middle" font-weight="bold">CBDF Document Structure (Phase II)</text>

  <!-- Meta Section -->
  <rect x="30" y="60" width="160" height="120" fill="#2d4a7a" stroke="#5b9bd5" stroke-width="2" rx="6"/>
  <text x="110" y="85" fill="#ffffff" font-size="13" text-anchor="middle" font-weight="bold">META</text>
  <text x="110" y="105" fill="#b0c4de" font-size="10" text-anchor="middle">Never compressed</text>
  <text x="110" y="120" fill="#b0c4de" font-size="10" text-anchor="middle">Always readable</text>
  <line x1="40" y1="130" x2="180" y2="130" stroke="#5b9bd5" stroke-width="1"/>
  <text x="45" y="145" fill="#90ee90" font-size="9">Pair Count (2B)</text>
  <text x="45" y="158" fill="#90ee90" font-size="9">Key/Value pairs</text>
  <text x="45" y="171" fill="#ffd700" font-size="9">Subject, From, To</text>

  <!-- FS separator -->
  <rect x="200" y="95" width="30" height="50" fill="#e74c3c" rx="3"/>
  <text x="215" y="125" fill="#ffffff" font-size="11" text-anchor="middle" font-weight="bold">FS</text>
  <text x="215" y="80" fill="#e74c3c" font-size="9" text-anchor="middle">0x1C</text>

  <!-- Styles Section -->
  <rect x="240" y="60" width="170" height="120" fill="#4a2d6a" stroke="#a855f7" stroke-width="2" rx="6"/>
  <text x="325" y="85" fill="#ffffff" font-size="13" text-anchor="middle" font-weight="bold">STYLES</text>
  <text x="325" y="105" fill="#d8b4fe" font-size="10" text-anchor="middle">Compressed with Text</text>
  <line x1="250" y1="112" x2="400" y2="112" stroke="#a855f7" stroke-width="1"/>
  <text x="255" y="127" fill="#90ee90" font-size="9">Length (4B)</text>
  <text x="255" y="140" fill="#90ee90" font-size="9">Layout byte</text>
  <text x="255" y="153" fill="#90ee90" font-size="9">GS sub-tables:</text>
  <text x="260" y="166" fill="#ffd700" font-size="8">BG|Border|Spacing|Text...</text>

  <!-- FS separator -->
  <rect x="420" y="95" width="30" height="50" fill="#e74c3c" rx="3"/>
  <text x="435" y="125" fill="#ffffff" font-size="11" text-anchor="middle" font-weight="bold">FS</text>
  <text x="435" y="80" fill="#e74c3c" font-size="9" text-anchor="middle">0x1C</text>

  <!-- Text Section -->
  <rect x="460" y="60" width="160" height="120" fill="#2d6a4a" stroke="#4ade80" stroke-width="2" rx="6"/>
  <text x="540" y="85" fill="#ffffff" font-size="13" text-anchor="middle" font-weight="bold">TEXT</text>
  <text x="540" y="105" fill="#bbf7d0" font-size="10" text-anchor="middle">Compressed with Styles</text>
  <line x1="470" y1="112" x2="610" y2="112" stroke="#4ade80" stroke-width="1"/>
  <text x="475" y="127" fill="#90ee90" font-size="9">Length (4B)</text>
  <text x="475" y="140" fill="#90ee90" font-size="9">TEXT_START (0x02)</text>
  <text x="475" y="153" fill="#90ee90" font-size="9">UTF-8 + commands</text>
  <text x="475" y="166" fill="#90ee90" font-size="9">TEXT_END (0x03)</text>

  <!-- FS separator -->
  <rect x="630" y="95" width="30" height="50" fill="#e74c3c" rx="3"/>
  <text x="645" y="125" fill="#ffffff" font-size="11" text-anchor="middle" font-weight="bold">FS</text>
  <text x="645" y="80" fill="#e74c3c" font-size="9" text-anchor="middle">0x1C</text>

  <!-- Resources Section -->
  <rect x="670" y="60" width="160" height="120" fill="#6a4a2d" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="750" y="85" fill="#ffffff" font-size="13" text-anchor="middle" font-weight="bold">RESOURCES</text>
  <text x="750" y="105" fill="#fde68a" font-size="10" text-anchor="middle">Never compressed</text>
  <text x="750" y="118" fill="#fde68a" font-size="10" text-anchor="middle">Skippable (abortable)</text>
  <line x1="680" y1="125" x2="820" y2="125" stroke="#f59e0b" stroke-width="1"/>
  <text x="685" y="140" fill="#90ee90" font-size="9">Length (4B)</text>
  <text x="685" y="153" fill="#90ee90" font-size="9">Count (2B)</text>
  <text x="685" y="166" fill="#ffd700" font-size="9">Images, fonts, media</text>

  <!-- Compression bracket -->
  <rect x="237" y="190" width="386" height="28" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="6,3" rx="4"/>
  <text x="430" y="210" fill="#ff6b6b" font-size="11" text-anchor="middle">Compressed together (if compression enabled)</text>

  <!-- Abortable download arrow -->
  <line x1="625" y1="240" x2="625" y2="260" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="620,258 630,258 625,268" fill="#f59e0b"/>
  <text x="625" y="285" fill="#f59e0b" font-size="10" text-anchor="middle">Client can stop here</text>
  <text x="625" y="298" fill="#f59e0b" font-size="10" text-anchor="middle">(abortable download)</text>

  <!-- Meta-Only Document -->
  <text x="450" y="340" fill="#e0e0e0" font-size="15" text-anchor="middle" font-weight="bold">Meta-Only Document (EOF flag set)</text>

  <rect x="250" y="360" width="400" height="70" fill="#2d4a7a" stroke="#5b9bd5" stroke-width="2" rx="6"/>
  <text x="450" y="385" fill="#ffffff" font-size="13" text-anchor="middle" font-weight="bold">META (with EOF flag)</text>
  <text x="450" y="405" fill="#b0c4de" font-size="11" text-anchor="middle">Complete document. No FS markers. No other sections.</text>
  <text x="450" y="420" fill="#ffd700" font-size="11" text-anchor="middle">Example: "Hello" = 14 bytes total</text>

  <!-- Rendering phases -->
  <text x="450" y="460" fill="#e0e0e0" font-size="13" text-anchor="middle" font-weight="bold">Rendering: Phase A (immediate) = Meta + Styles + Text    |    Phase B (optional) = Resources</text>

  <!-- Legend -->
  <rect x="30" y="480" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="48" y="491" fill="#b0b0b0" font-size="10">= SECTION_SEP (0x1C)</text>
  <rect x="200" y="480" width="12" height="12" fill="none" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="3,2" rx="2"/>
  <text x="218" y="491" fill="#b0b0b0" font-size="10">= Compression boundary</text>
</svg>
