<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="Consolas, monospace">
  <title>CBDF Control Character Map</title>

  <!-- Background -->
  <rect width="900" height="700" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="450" y="30" fill="#e0e0e0" font-size="18" text-anchor="middle" font-weight="bold">CBDF Control Character Map (0x00-0x1F)</text>

  <!-- Grid: 8 columns x 4 rows -->
  <!-- Row 1: 0x00-0x07 -->
  <g transform="translate(15, 50)">
    <!-- 0x00 NOP -->
    <rect x="0" y="0" width="105" height="65" fill="#333" stroke="#555" stroke-width="1" rx="4"/>
    <text x="52" y="17" fill="#888" font-size="9" text-anchor="middle">0x00</text>
    <text x="52" y="34" fill="#ffffff" font-size="11" text-anchor="middle" font-weight="bold">NOP</text>
    <text x="52" y="50" fill="#888" font-size="8" text-anchor="middle">Padding</text>

    <!-- 0x01 SUBJECT_START -->
    <rect x="110" y="0" width="105" height="65" fill="#2d4a7a" stroke="#5b9bd5" stroke-width="1.5" rx="4"/>
    <text x="162" y="17" fill="#5b9bd5" font-size="9" text-anchor="middle">0x01</text>
    <text x="162" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">SUBJECT</text>
    <text x="162" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_START</text>
    <text x="162" y="59" fill="#90ee90" font-size="8" text-anchor="middle">no payload</text>

    <!-- 0x02 TEXT_START -->
    <rect x="220" y="0" width="105" height="65" fill="#2d4a7a" stroke="#5b9bd5" stroke-width="1.5" rx="4"/>
    <text x="272" y="17" fill="#5b9bd5" font-size="9" text-anchor="middle">0x02</text>
    <text x="272" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">TEXT</text>
    <text x="272" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_START</text>
    <text x="272" y="59" fill="#90ee90" font-size="8" text-anchor="middle">no payload</text>

    <!-- 0x03 TEXT_END -->
    <rect x="330" y="0" width="105" height="65" fill="#2d4a7a" stroke="#5b9bd5" stroke-width="1.5" rx="4"/>
    <text x="382" y="17" fill="#5b9bd5" font-size="9" text-anchor="middle">0x03</text>
    <text x="382" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">TEXT</text>
    <text x="382" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_END</text>
    <text x="382" y="59" fill="#90ee90" font-size="8" text-anchor="middle">no payload</text>

    <!-- 0x04 DOC_END -->
    <rect x="440" y="0" width="105" height="65" fill="#2d4a7a" stroke="#5b9bd5" stroke-width="1.5" rx="4"/>
    <text x="492" y="17" fill="#5b9bd5" font-size="9" text-anchor="middle">0x04</text>
    <text x="492" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">DOC</text>
    <text x="492" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_END</text>
    <text x="492" y="59" fill="#90ee90" font-size="8" text-anchor="middle">no payload</text>

    <!-- 0x05 RESERVED -->
    <rect x="550" y="0" width="105" height="65" fill="#2a2a2a" stroke="#444" stroke-width="1" stroke-dasharray="4,2" rx="4"/>
    <text x="602" y="17" fill="#666" font-size="9" text-anchor="middle">0x05</text>
    <text x="602" y="37" fill="#666" font-size="10" text-anchor="middle">RESERVED</text>
    <text x="602" y="55" fill="#555" font-size="8" text-anchor="middle">Phase III</text>

    <!-- 0x06 RESERVED -->
    <rect x="660" y="0" width="105" height="65" fill="#2a2a2a" stroke="#444" stroke-width="1" stroke-dasharray="4,2" rx="4"/>
    <text x="712" y="17" fill="#666" font-size="9" text-anchor="middle">0x06</text>
    <text x="712" y="37" fill="#666" font-size="10" text-anchor="middle">RESERVED</text>
    <text x="712" y="55" fill="#555" font-size="8" text-anchor="middle">Phase III</text>

    <!-- 0x07 RESERVED -->
    <rect x="770" y="0" width="105" height="65" fill="#2a2a2a" stroke="#444" stroke-width="1" stroke-dasharray="4,2" rx="4"/>
    <text x="822" y="17" fill="#666" font-size="9" text-anchor="middle">0x07</text>
    <text x="822" y="37" fill="#666" font-size="10" text-anchor="middle">RESERVED</text>
    <text x="822" y="55" fill="#555" font-size="8" text-anchor="middle">Alert</text>
  </g>

  <!-- Row 2: 0x08-0x0F -->
  <g transform="translate(15, 125)">
    <!-- 0x08 RESERVED -->
    <rect x="0" y="0" width="105" height="65" fill="#2a2a2a" stroke="#444" stroke-width="1" stroke-dasharray="4,2" rx="4"/>
    <text x="52" y="17" fill="#666" font-size="9" text-anchor="middle">0x08</text>
    <text x="52" y="37" fill="#666" font-size="10" text-anchor="middle">RESERVED</text>
    <text x="52" y="55" fill="#555" font-size="8" text-anchor="middle">Backspace</text>

    <!-- 0x09 TAB -->
    <rect x="110" y="0" width="105" height="65" fill="#2d6a4a" stroke="#4ade80" stroke-width="1.5" rx="4"/>
    <text x="162" y="17" fill="#4ade80" font-size="9" text-anchor="middle">0x09</text>
    <text x="162" y="37" fill="#ffffff" font-size="11" text-anchor="middle" font-weight="bold">TAB</text>
    <text x="162" y="55" fill="#bbf7d0" font-size="8" text-anchor="middle">kept in plaintext</text>

    <!-- 0x0A LINE_BREAK -->
    <rect x="220" y="0" width="105" height="65" fill="#2d6a4a" stroke="#4ade80" stroke-width="1.5" rx="4"/>
    <text x="272" y="17" fill="#4ade80" font-size="9" text-anchor="middle">0x0A</text>
    <text x="272" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">LINE</text>
    <text x="272" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_BREAK</text>
    <text x="272" y="59" fill="#bbf7d0" font-size="8" text-anchor="middle">kept in plaintext</text>

    <!-- 0x0B PARA_BREAK -->
    <rect x="330" y="0" width="105" height="65" fill="#2d4a7a" stroke="#5b9bd5" stroke-width="1.5" rx="4"/>
    <text x="382" y="17" fill="#5b9bd5" font-size="9" text-anchor="middle">0x0B</text>
    <text x="382" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">PARA</text>
    <text x="382" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_BREAK</text>
    <text x="382" y="59" fill="#90ee90" font-size="8" text-anchor="middle">no payload</text>

    <!-- 0x0C PAGE_BREAK -->
    <rect x="440" y="0" width="105" height="65" fill="#2d4a7a" stroke="#5b9bd5" stroke-width="1.5" rx="4"/>
    <text x="492" y="17" fill="#5b9bd5" font-size="9" text-anchor="middle">0x0C</text>
    <text x="492" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">PAGE</text>
    <text x="492" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_BREAK</text>
    <text x="492" y="59" fill="#90ee90" font-size="8" text-anchor="middle">no payload</text>

    <!-- 0x0D HORIZ_RULE -->
    <rect x="550" y="0" width="105" height="65" fill="#6a4a2d" stroke="#f59e0b" stroke-width="1.5" rx="4"/>
    <text x="602" y="17" fill="#f59e0b" font-size="9" text-anchor="middle">0x0D</text>
    <text x="602" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">HORIZ</text>
    <text x="602" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_RULE</text>
    <text x="602" y="59" fill="#fde68a" font-size="8" text-anchor="middle">[StyleIdx:1]</text>

    <!-- 0x0E LINK_START -->
    <rect x="660" y="0" width="105" height="65" fill="#6a4a2d" stroke="#f59e0b" stroke-width="1.5" rx="4"/>
    <text x="712" y="17" fill="#f59e0b" font-size="9" text-anchor="middle">0x0E</text>
    <text x="712" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">LINK</text>
    <text x="712" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_START</text>
    <text x="712" y="59" fill="#fde68a" font-size="8" text-anchor="middle">[T:1][L:1][Tgt:N]</text>

    <!-- 0x0F LINK_END -->
    <rect x="770" y="0" width="105" height="65" fill="#6a4a2d" stroke="#f59e0b" stroke-width="1.5" rx="4"/>
    <text x="822" y="17" fill="#f59e0b" font-size="9" text-anchor="middle">0x0F</text>
    <text x="822" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">LINK</text>
    <text x="822" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_END</text>
    <text x="822" y="59" fill="#90ee90" font-size="8" text-anchor="middle">no payload</text>
  </g>

  <!-- Row 3: 0x10-0x17 -->
  <g transform="translate(15, 200)">
    <!-- 0x10 DATA_ESCAPE -->
    <rect x="0" y="0" width="105" height="65" fill="#6a4a2d" stroke="#f59e0b" stroke-width="1.5" rx="4"/>
    <text x="52" y="17" fill="#f59e0b" font-size="9" text-anchor="middle">0x10</text>
    <text x="52" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">DATA</text>
    <text x="52" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_ESCAPE</text>
    <text x="52" y="59" fill="#fde68a" font-size="8" text-anchor="middle">[Len:2][Data:N]</text>

    <!-- 0x11 STYLE_TEXT -->
    <rect x="110" y="0" width="105" height="65" fill="#4a2d6a" stroke="#a855f7" stroke-width="1.5" rx="4"/>
    <text x="162" y="17" fill="#a855f7" font-size="9" text-anchor="middle">0x11</text>
    <text x="162" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">STYLE</text>
    <text x="162" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_TEXT</text>
    <text x="162" y="59" fill="#d8b4fe" font-size="8" text-anchor="middle">[Index:1]</text>

    <!-- 0x12 STYLE_CONTAINER -->
    <rect x="220" y="0" width="105" height="65" fill="#4a2d6a" stroke="#a855f7" stroke-width="1.5" rx="4"/>
    <text x="272" y="17" fill="#a855f7" font-size="9" text-anchor="middle">0x12</text>
    <text x="272" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">STYLE</text>
    <text x="272" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_CONTAINER</text>
    <text x="272" y="59" fill="#d8b4fe" font-size="8" text-anchor="middle">[Index:1]</text>

    <!-- 0x13 STYLE_TABLE -->
    <rect x="330" y="0" width="105" height="65" fill="#4a2d6a" stroke="#a855f7" stroke-width="1.5" rx="4"/>
    <text x="382" y="17" fill="#a855f7" font-size="9" text-anchor="middle">0x13</text>
    <text x="382" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">STYLE</text>
    <text x="382" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_TABLE</text>
    <text x="382" y="59" fill="#d8b4fe" font-size="8" text-anchor="middle">[Index:1]</text>

    <!-- 0x14 STYLE_END -->
    <rect x="440" y="0" width="105" height="65" fill="#4a2d6a" stroke="#a855f7" stroke-width="1.5" rx="4"/>
    <text x="492" y="17" fill="#a855f7" font-size="9" text-anchor="middle">0x14</text>
    <text x="492" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">STYLE</text>
    <text x="492" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_END</text>
    <text x="492" y="59" fill="#90ee90" font-size="8" text-anchor="middle">pop stack</text>

    <!-- 0x15 ELEMENT_ID -->
    <rect x="550" y="0" width="105" height="65" fill="#6a4a2d" stroke="#f59e0b" stroke-width="1.5" rx="4"/>
    <text x="602" y="17" fill="#f59e0b" font-size="9" text-anchor="middle">0x15</text>
    <text x="602" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">ELEMENT</text>
    <text x="602" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_ID</text>
    <text x="602" y="59" fill="#fde68a" font-size="8" text-anchor="middle">[ID:1]</text>

    <!-- 0x16 IMAGE -->
    <rect x="660" y="0" width="105" height="65" fill="#6a4a2d" stroke="#f59e0b" stroke-width="1.5" rx="4"/>
    <text x="712" y="17" fill="#f59e0b" font-size="9" text-anchor="middle">0x16</text>
    <text x="712" y="37" fill="#ffffff" font-size="11" text-anchor="middle" font-weight="bold">IMAGE</text>
    <text x="712" y="55" fill="#fde68a" font-size="8" text-anchor="middle">[ImgDefIdx:1]</text>

    <!-- 0x17 BLOCK_END -->
    <rect x="770" y="0" width="105" height="65" fill="#4a2d6a" stroke="#a855f7" stroke-width="1.5" rx="4"/>
    <text x="822" y="17" fill="#a855f7" font-size="9" text-anchor="middle">0x17</text>
    <text x="822" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">BLOCK</text>
    <text x="822" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_END</text>
    <text x="822" y="59" fill="#90ee90" font-size="8" text-anchor="middle">close block</text>
  </g>

  <!-- Row 4: 0x18-0x1F -->
  <g transform="translate(15, 275)">
    <!-- 0x18 RESERVED_HIDE -->
    <rect x="0" y="0" width="105" height="65" fill="#2a2a2a" stroke="#444" stroke-width="1" stroke-dasharray="4,2" rx="4"/>
    <text x="52" y="17" fill="#666" font-size="9" text-anchor="middle">0x18</text>
    <text x="52" y="37" fill="#666" font-size="10" text-anchor="middle">RESERVED</text>
    <text x="52" y="55" fill="#555" font-size="8" text-anchor="middle">Hide/Show</text>

    <!-- 0x19 ITEM_BLOCK -->
    <rect x="110" y="0" width="105" height="65" fill="#6a4a2d" stroke="#f59e0b" stroke-width="1.5" rx="4"/>
    <text x="162" y="17" fill="#f59e0b" font-size="9" text-anchor="middle">0x19</text>
    <text x="162" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">ITEM</text>
    <text x="162" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_BLOCK</text>
    <text x="162" y="59" fill="#fde68a" font-size="8" text-anchor="middle">[Type:1][Sty:1]</text>

    <!-- 0x1A AI_PROMPT -->
    <rect x="220" y="0" width="105" height="65" fill="#2d6a6a" stroke="#22d3ee" stroke-width="1.5" rx="4"/>
    <text x="272" y="17" fill="#22d3ee" font-size="9" text-anchor="middle">0x1A</text>
    <text x="272" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">AI</text>
    <text x="272" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_PROMPT</text>
    <text x="272" y="59" fill="#a5f3fc" font-size="7" text-anchor="middle">[T:1][Len:2][UTF8:N]</text>

    <!-- 0x1B ESCAPE -->
    <rect x="330" y="0" width="105" height="65" fill="#2a2a2a" stroke="#444" stroke-width="1" stroke-dasharray="4,2" rx="4"/>
    <text x="382" y="17" fill="#666" font-size="9" text-anchor="middle">0x1B</text>
    <text x="382" y="37" fill="#888" font-size="11" text-anchor="middle" font-weight="bold">ESCAPE</text>
    <text x="382" y="55" fill="#555" font-size="8" text-anchor="middle">[Code:1][...]</text>

    <!-- 0x1C SECTION_SEP -->
    <rect x="440" y="0" width="105" height="65" fill="#5c1f1f" stroke="#e74c3c" stroke-width="1.5" rx="4"/>
    <text x="492" y="17" fill="#e74c3c" font-size="9" text-anchor="middle">0x1C</text>
    <text x="492" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">SECTION</text>
    <text x="492" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_SEP</text>
    <text x="492" y="59" fill="#fca5a5" font-size="8" text-anchor="middle">structural</text>

    <!-- 0x1D GROUP_SEP -->
    <rect x="550" y="0" width="105" height="65" fill="#5c1f1f" stroke="#e74c3c" stroke-width="1.5" rx="4"/>
    <text x="602" y="17" fill="#e74c3c" font-size="9" text-anchor="middle">0x1D</text>
    <text x="602" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">GROUP</text>
    <text x="602" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_SEP</text>
    <text x="602" y="59" fill="#fca5a5" font-size="8" text-anchor="middle">structural</text>

    <!-- 0x1E RECORD_SEP -->
    <rect x="660" y="0" width="105" height="65" fill="#5c1f1f" stroke="#e74c3c" stroke-width="1.5" rx="4"/>
    <text x="712" y="17" fill="#e74c3c" font-size="9" text-anchor="middle">0x1E</text>
    <text x="712" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">RECORD</text>
    <text x="712" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_SEP</text>
    <text x="712" y="59" fill="#fca5a5" font-size="8" text-anchor="middle">structural</text>

    <!-- 0x1F UNIT_SEP -->
    <rect x="770" y="0" width="105" height="65" fill="#5c1f1f" stroke="#e74c3c" stroke-width="1.5" rx="4"/>
    <text x="822" y="17" fill="#e74c3c" font-size="9" text-anchor="middle">0x1F</text>
    <text x="822" y="34" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">UNIT</text>
    <text x="822" y="46" fill="#ffffff" font-size="10" text-anchor="middle" font-weight="bold">_SEP</text>
    <text x="822" y="59" fill="#fca5a5" font-size="8" text-anchor="middle">structural</text>
  </g>

  <!-- Legend -->
  <g transform="translate(30, 370)">
    <text x="0" y="15" fill="#e0e0e0" font-size="13" font-weight="bold">Legend:</text>

    <rect x="0" y="25" width="18" height="18" fill="#2d4a7a" stroke="#5b9bd5" stroke-width="1.5" rx="3"/>
    <text x="25" y="39" fill="#b0b0b0" font-size="11">Markers / Terminators (no payload)</text>

    <rect x="300" y="25" width="18" height="18" fill="#4a2d6a" stroke="#a855f7" stroke-width="1.5" rx="3"/>
    <text x="325" y="39" fill="#b0b0b0" font-size="11">Style Commands (push/pop)</text>

    <rect x="580" y="25" width="18" height="18" fill="#6a4a2d" stroke="#f59e0b" stroke-width="1.5" rx="3"/>
    <text x="605" y="39" fill="#b0b0b0" font-size="11">Elements (links, images, etc.)</text>

    <rect x="0" y="50" width="18" height="18" fill="#2d6a4a" stroke="#4ade80" stroke-width="1.5" rx="3"/>
    <text x="25" y="64" fill="#b0b0b0" font-size="11">Preserved in plain text</text>

    <rect x="300" y="50" width="18" height="18" fill="#5c1f1f" stroke="#e74c3c" stroke-width="1.5" rx="3"/>
    <text x="325" y="64" fill="#b0b0b0" font-size="11">Structural Separators</text>

    <rect x="580" y="50" width="18" height="18" fill="#2a2a2a" stroke="#444" stroke-width="1" stroke-dasharray="4,2" rx="3"/>
    <text x="605" y="64" fill="#b0b0b0" font-size="11">Reserved (Phase III)</text>
  </g>

  <!-- Style Stack Example -->
  <text x="450" y="470" fill="#e0e0e0" font-size="14" text-anchor="middle" font-weight="bold">Style Stack Example</text>

  <g transform="translate(30, 485)">
    <text x="0" y="15" fill="#a855f7" font-size="11">[STYLE_CONTAINER 0x01]</text>
    <text x="280" y="15" fill="#666" font-size="10">stack: [C1]</text>

    <text x="20" y="35" fill="#a855f7" font-size="11">[STYLE_TEXT 0x00]</text>
    <text x="280" y="35" fill="#666" font-size="10">stack: [C1, T0]</text>

    <text x="40" y="55" fill="#ffffff" font-size="11">Normal text</text>

    <text x="40" y="75" fill="#a855f7" font-size="11">[STYLE_TEXT 0x03]</text>
    <text x="280" y="75" fill="#666" font-size="10">stack: [C1, T0, T3]</text>

    <text x="60" y="95" fill="#f59e0b" font-size="11" font-weight="bold">Bold text</text>

    <text x="40" y="115" fill="#a855f7" font-size="11">[STYLE_END]</text>
    <text x="280" y="115" fill="#666" font-size="10">stack: [C1, T0]  (popped T3)</text>

    <text x="40" y="135" fill="#ffffff" font-size="11">Normal again</text>

    <text x="20" y="155" fill="#a855f7" font-size="11">[STYLE_END]</text>
    <text x="280" y="155" fill="#666" font-size="10">stack: [C1]  (popped T0)</text>

    <text x="0" y="175" fill="#a855f7" font-size="11">[BLOCK_END]</text>
    <text x="280" y="175" fill="#666" font-size="10">stack: []  (closed container)</text>
  </g>
</svg>
