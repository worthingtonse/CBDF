<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="Consolas, monospace">
  <title>CBDF R5G6B5 Color System</title>

  <!-- Background -->
  <rect width="800" height="420" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" fill="#e0e0e0" font-size="18" text-anchor="middle" font-weight="bold">R5G6B5 Color Encoding (16-bit, 2 bytes)</text>

  <!-- Bit layout diagram -->
  <text x="400" y="60" fill="#888" font-size="12" text-anchor="middle">MSB                                                                                    LSB</text>

  <g transform="translate(80, 70)">
    <!-- Red bits -->
    <rect x="0" y="0" width="40" height="35" fill="#b91c1c" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="40" y="0" width="40" height="35" fill="#b91c1c" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="80" y="0" width="40" height="35" fill="#b91c1c" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="120" y="0" width="40" height="35" fill="#b91c1c" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="160" y="0" width="40" height="35" fill="#b91c1c" stroke="#ef4444" stroke-width="1.5"/>
    <text x="100" y="23" fill="#ffffff" font-size="12" text-anchor="middle" font-weight="bold">RED (5 bits)</text>
    <text x="0" y="50" fill="#ef4444" font-size="9">R4</text>
    <text x="40" y="50" fill="#ef4444" font-size="9">R3</text>
    <text x="80" y="50" fill="#ef4444" font-size="9">R2</text>
    <text x="120" y="50" fill="#ef4444" font-size="9">R1</text>
    <text x="160" y="50" fill="#ef4444" font-size="9">R0</text>

    <!-- Green bits -->
    <rect x="200" y="0" width="40" height="35" fill="#15803d" stroke="#4ade80" stroke-width="1.5"/>
    <rect x="240" y="0" width="40" height="35" fill="#15803d" stroke="#4ade80" stroke-width="1.5"/>
    <rect x="280" y="0" width="40" height="35" fill="#15803d" stroke="#4ade80" stroke-width="1.5"/>
    <rect x="320" y="0" width="40" height="35" fill="#15803d" stroke="#4ade80" stroke-width="1.5"/>
    <rect x="360" y="0" width="40" height="35" fill="#15803d" stroke="#4ade80" stroke-width="1.5"/>
    <rect x="400" y="0" width="40" height="35" fill="#15803d" stroke="#4ade80" stroke-width="1.5"/>
    <text x="320" y="23" fill="#ffffff" font-size="12" text-anchor="middle" font-weight="bold">GREEN (6 bits)</text>
    <text x="200" y="50" fill="#4ade80" font-size="9">G5</text>
    <text x="240" y="50" fill="#4ade80" font-size="9">G4</text>
    <text x="280" y="50" fill="#4ade80" font-size="9">G3</text>
    <text x="320" y="50" fill="#4ade80" font-size="9">G2</text>
    <text x="360" y="50" fill="#4ade80" font-size="9">G1</text>
    <text x="400" y="50" fill="#4ade80" font-size="9">G0</text>

    <!-- Blue bits -->
    <rect x="440" y="0" width="40" height="35" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.5"/>
    <rect x="480" y="0" width="40" height="35" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.5"/>
    <rect x="520" y="0" width="40" height="35" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.5"/>
    <rect x="560" y="0" width="40" height="35" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.5"/>
    <rect x="600" y="0" width="40" height="35" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="520" y="23" fill="#ffffff" font-size="12" text-anchor="middle" font-weight="bold">BLUE (5 bits)</text>
    <text x="440" y="50" fill="#60a5fa" font-size="9">B4</text>
    <text x="480" y="50" fill="#60a5fa" font-size="9">B3</text>
    <text x="520" y="50" fill="#60a5fa" font-size="9">B2</text>
    <text x="560" y="50" fill="#60a5fa" font-size="9">B1</text>
    <text x="600" y="50" fill="#60a5fa" font-size="9">B0</text>

    <!-- Bit numbers -->
    <text x="10" y="-5" fill="#666" font-size="8">15</text>
    <text x="610" y="-5" fill="#666" font-size="8">0</text>
  </g>

  <!-- Color examples -->
  <text x="400" y="160" fill="#e0e0e0" font-size="14" text-anchor="middle" font-weight="bold">Common Colors</text>

  <g transform="translate(40, 170)">
    <!-- Black -->
    <rect x="0" y="0" width="60" height="40" fill="#000000" stroke="#444" stroke-width="1" rx="3"/>
    <text x="30" y="55" fill="#888" font-size="9" text-anchor="middle">0x0000</text>
    <text x="30" y="67" fill="#888" font-size="9" text-anchor="middle">Black</text>

    <!-- Red -->
    <rect x="80" y="0" width="60" height="40" fill="#ff0000" stroke="#444" stroke-width="1" rx="3"/>
    <text x="110" y="55" fill="#888" font-size="9" text-anchor="middle">0xF800</text>
    <text x="110" y="67" fill="#888" font-size="9" text-anchor="middle">Red</text>

    <!-- Green -->
    <rect x="160" y="0" width="60" height="40" fill="#00ff00" stroke="#444" stroke-width="1" rx="3"/>
    <text x="190" y="55" fill="#888" font-size="9" text-anchor="middle">0x07E0</text>
    <text x="190" y="67" fill="#888" font-size="9" text-anchor="middle">Green</text>

    <!-- Blue -->
    <rect x="240" y="0" width="60" height="40" fill="#0000ff" stroke="#444" stroke-width="1" rx="3"/>
    <text x="270" y="55" fill="#888" font-size="9" text-anchor="middle">0x001F</text>
    <text x="270" y="67" fill="#888" font-size="9" text-anchor="middle">Blue</text>

    <!-- Yellow -->
    <rect x="320" y="0" width="60" height="40" fill="#ffff00" stroke="#444" stroke-width="1" rx="3"/>
    <text x="350" y="55" fill="#888" font-size="9" text-anchor="middle">0xFFE0</text>
    <text x="350" y="67" fill="#888" font-size="9" text-anchor="middle">Yellow</text>

    <!-- Mid Gray -->
    <rect x="400" y="0" width="60" height="40" fill="#848284" stroke="#444" stroke-width="1" rx="3"/>
    <text x="430" y="55" fill="#888" font-size="9" text-anchor="middle">0x8410</text>
    <text x="430" y="67" fill="#888" font-size="9" text-anchor="middle">Gray</text>

    <!-- Cyan -->
    <rect x="480" y="0" width="60" height="40" fill="#00ffff" stroke="#444" stroke-width="1" rx="3"/>
    <text x="510" y="55" fill="#888" font-size="9" text-anchor="middle">0x07FF</text>
    <text x="510" y="67" fill="#888" font-size="9" text-anchor="middle">Cyan</text>

    <!-- White -->
    <rect x="560" y="0" width="60" height="40" fill="#ffffff" stroke="#444" stroke-width="1" rx="3"/>
    <text x="590" y="55" fill="#888" font-size="9" text-anchor="middle">0xFFFF</text>
    <text x="590" y="67" fill="#888" font-size="9" text-anchor="middle">White</text>

    <!-- Magenta -->
    <rect x="640" y="0" width="60" height="40" fill="#ff00ff" stroke="#444" stroke-width="1" rx="3"/>
    <text x="670" y="55" fill="#888" font-size="9" text-anchor="middle">0xF81F</text>
    <text x="670" y="67" fill="#888" font-size="9" text-anchor="middle">Magenta</text>
  </g>

  <!-- Transparency codes -->
  <text x="400" y="275" fill="#e0e0e0" font-size="14" text-anchor="middle" font-weight="bold">Reserved Transparency Codes (0x000C - 0x0010)</text>
  <text x="400" y="292" fill="#888" font-size="10" text-anchor="middle">5 near-black dark blues sacrificed (luminance 7-10 / 255, invisible on displays)</text>

  <g transform="translate(100, 300)">
    <!-- The 5 transparency codes as swatches -->
    <rect x="0" y="0" width="100" height="45" fill="#000063" stroke="#e74c3c" stroke-width="2" rx="3"/>
    <text x="50" y="18" fill="#e74c3c" font-size="10" text-anchor="middle" font-weight="bold">0x000C</text>
    <text x="50" y="33" fill="#ffffff" font-size="9" text-anchor="middle">100% transp.</text>

    <rect x="120" y="0" width="100" height="45" fill="#00006B" stroke="#e74c3c" stroke-width="2" rx="3"/>
    <text x="170" y="18" fill="#e74c3c" font-size="10" text-anchor="middle" font-weight="bold">0x000D</text>
    <text x="170" y="33" fill="#ffffff" font-size="9" text-anchor="middle">80% transp.</text>

    <rect x="240" y="0" width="100" height="45" fill="#000073" stroke="#e74c3c" stroke-width="2" rx="3"/>
    <text x="290" y="18" fill="#e74c3c" font-size="10" text-anchor="middle" font-weight="bold">0x000E</text>
    <text x="290" y="33" fill="#ffffff" font-size="9" text-anchor="middle">60% transp.</text>

    <rect x="360" y="0" width="100" height="45" fill="#00007B" stroke="#e74c3c" stroke-width="2" rx="3"/>
    <text x="410" y="18" fill="#e74c3c" font-size="10" text-anchor="middle" font-weight="bold">0x000F</text>
    <text x="410" y="33" fill="#ffffff" font-size="9" text-anchor="middle">40% transp.</text>

    <rect x="480" y="0" width="100" height="45" fill="#000084" stroke="#e74c3c" stroke-width="2" rx="3"/>
    <text x="530" y="18" fill="#e74c3c" font-size="10" text-anchor="middle" font-weight="bold">0x0010</text>
    <text x="530" y="33" fill="#ffffff" font-size="9" text-anchor="middle">20% transp.</text>
  </g>

  <!-- Note -->
  <text x="400" y="375" fill="#888" font-size="10" text-anchor="middle">Black (0x0000) and White (0xFFFF) are preserved. 65,531 usable colors remain.</text>
  <text x="400" y="395" fill="#666" font-size="10" text-anchor="middle">Conversion guard: if rgb_to_color() produces 0x000C-0x0010, shift to 0x0011.</text>
  <text x="400" y="410" fill="#e74c3c" font-size="10" text-anchor="middle">CSS: 7 bytes ("#FF0000")  vs  CBDF: 2 bytes (0xF800)  =  71% smaller</text>
</svg>
